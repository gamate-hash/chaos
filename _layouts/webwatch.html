
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ee0826">
    <meta name="apple-mobile-web-app-title" content="webchnl">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>{{ page.abtitle }} | {{ site.watchtitle }}</title>
    <meta property="og:title" content="{{ page.abtitle }} |  {{ site.watchtitle }}" />
    <meta property="og:description" content="Watch {{ page.abtitle }} on {{ site.watchtitle }}" />
    <meta property="og:url" content="/watch/index.php?slug={{ page.abtitle }}" />
    <meta property="og:image" content="/assets/img/channelicons/{{ page.abtitle }}.png" />
    <meta name="og:site_name" content="webchnl">
    <meta name="twitter:site" content="@webchnl">
    <meta name="theme-color" content="#ee0826" />
    <link rel="icon" href="">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://webchnl.com/assets/css/watch.css?12">
    <style>
        body {
            background-image: url("{{ page.bg }}");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: 100dvh;
        }
                            
        .topbar {
            backdrop-filter: blur(10px);
            background-color: rgba(100, 0, 0, 0.4);;
            box-shadow: none;
        }

        .info {
            backdrop-filter: blur(10px);
            background-color: rgba(100, 0, 0, 0.4);
        }
    
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/"><button class="menubutton"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button></a>
        <p id="channel-title-text">{{ page.abtitle }}</p>
    </div>

    <div class="main">
        <div class="player">
            <body>
                <video id="my-video" class="video-js vjs-fluid" playsinline loop controls preload="auto" width="640" height="264" poster="{{ page.poster }}" data-setup="{}">
                    <source src="{{ page.m3u8 }}" type="application/x-mpegURL">
                  <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that<a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a></p>
                </video>
</div>

        <div class="info">
            <h1 id="about-title">About {{ page.abtitle }}</h1>
            <div id="about-description"><p>{{ page.desc }}<br>This page was last updated on {{ site.time | date: "%a, %d %b %Y at %H:%M." }}</p>
        </div>
    </div>
</html>
